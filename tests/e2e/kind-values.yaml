# Kind cluster overrides for automated regression tests
#
# Uses k8s sandbox with HTTP IPC.
# Host pod creates sandbox pods via K8s API for each request.
# All external services mocked via mock-server on host.
# URL rewrites (set dynamically by global-setup.ts) redirect
# api.linear.app and mock-target.test to mock server.

global:
  imageTag: local
  imageRepository: ax-test

imageDefaults:
  registry: ""
  tag: local
  pullPolicy: IfNotPresent

host:
  replicas: 1
  image:
    registry: ""
    repository: ax-test
    tag: local
    pullPolicy: IfNotPresent
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits: { cpu: "1", memory: "2Gi" }
  # Point at the e2e test-fixture skills dir baked into the image.
  # Default prod path is the project-root `skills/` dir; here we swap
  # to the fixture dir so Task 4.4's `linear-mcp` SKILL.md (with
  # https://mock-target.test/mcp/linear frontmatter) gets seeded into
  # every agent's `.ax/skills/`.
  env:
    - name: AX_SKILLS_DIR
      value: /opt/ax/fixtures/skills

config:
  agent: pi-coding-agent
  profile: yolo
  models:
    default:
      - openrouter/google/gemini-3-flash-preview
  providers:
    memory: cortex
    audit: database
    credentials: database
    sandbox: k8s
    security: patterns
    scheduler: plainjob
    channels: []
    web:
      extract: none
      search: none
    storage: database
    database: postgresql
    eventbus: postgres
    workspace: git-local
  history:
    max_turns: 50
    thread_context_turns: 5
    summarize: false
    summarize_threshold: 40
    summarize_keep_recent: 10
    memory_recall: true
    memory_recall_limit: 5
    memory_recall_scope: "*"
    embedding_model: deepinfra/Qwen/Qwen3-Embedding-0.6B
    embedding_dimensions: 1024
  sandbox:
    timeout_sec: 120
    memory_mb: 512
  scheduler:
    active_hours:
      start: "00:00"
      end: "23:59"
      timezone: UTC
    max_token_budget: 4096
    heartbeat_interval_min: 60
  web_proxy: true

namespace:
  create: false
  name: ax-e2e

sandbox:
  runtimeClass: ""
  image:
    registry: ""
    repository: ax-test
    tag: local
    pullPolicy: IfNotPresent

postgresql:
  external:
    enabled: false
  internal:
    enabled: true
    auth:
      database: ax
      username: ax
    primary:
      persistence:
        size: 1Gi

webProxy:
  enabled: true

# Disable the git-server deployment — e2e uses workspace: git-local (on-disk
# bare repos), so no external git server is needed. Also avoids the
# ImagePullBackOff for `ax-git-server:local` (that image isn't built by e2e).
gitServer:
  enabled: false

networkPolicies:
  enabled: false

apiCredentials:
  existingSecret: "ax-api-credentials"
  envVars:
    OPENROUTER_API_KEY: "OPENROUTER_API_KEY"
    OPENROUTER_BASE_URL: "OPENROUTER_BASE_URL"
    STORAGE_EMULATOR_HOST: "STORAGE_EMULATOR_HOST"
    GCS_WORKSPACE_BUCKET: "GCS_WORKSPACE_BUCKET"
    DEEPINFRA_API_KEY: "DEEPINFRA_API_KEY"
